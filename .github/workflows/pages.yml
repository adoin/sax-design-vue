name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install and build docs + playground
        shell: bash
        env:
          VUEPRESS_BASE: /sax-design-vue/
          PLAY_BASE: /sax-design-vue/play/
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile
          pnpm run build:theme
          pnpm -C play build
          pnpm run docs:build
          mkdir -p docs/.vuepress/dist/play
          cp -r play/dist/* docs/.vuepress/dist/play/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vuepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup-artifacts:
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      actions: write
    steps:
      - name: Keep only the 2 newest workflow artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const keep = 2
            const { data } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            })

            const artifacts = data.artifacts
              .filter((artifact) => !artifact.expired)
              .sort(
                (a, b) =>
                  new Date(b.created_at).getTime() -
                  new Date(a.created_at).getTime()
              )

            for (const artifact of artifacts.slice(keep)) {
              core.info(`Deleting artifact ${artifact.id} (${artifact.name})`)
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              })
            }
